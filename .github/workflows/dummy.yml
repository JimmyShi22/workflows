name: Dummy

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      owner:
        required: true
        type: string
      repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      comment_body:
        required: true
        type: string
      anthropic_api_key:
        required: true
        type: string
      gh_pat:
        required: false
        type: string

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          repository: ${{ inputs.owner }}/${{ inputs.repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ inputs.gh_pat }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ inputs.gh_pat }}
        with:
          prompt: "Repository: ${{ inputs.owner }}/${{ inputs.repo }}, PR #${{ inputs.pr_number }}. ${{ inputs.comment_body }}"
          anthropic_api_key: ${{ inputs.anthropic_api_key }}
          github_token: ${{ inputs.gh_pat }}
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep"
          show_full_output: true
    
      - name: Post result as comment
        if: always()
        env:
          GH_TOKEN: ${{ inputs.gh_pat }}
        run: |
          RESPONSE=$(jq -r '.[] | select(.type == "result") | .result' /home/runner/work/_temp/claude-execution-output.json)
          if [ -n "$RESPONSE" ]; then
            gh issue comment ${{ inputs.pr_number }} \
              --repo ${{ inputs.owner }}/${{ inputs.repo }} \
              --body "$RESPONSE"
          fi
